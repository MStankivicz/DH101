<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="768" viewBox="0 0 2048 768">
  <defs>
    <style>
      .ui { font-family: Arial, Helvetica, sans-serif; }
      .panel { fill: #c7ecf7; stroke: #2c2c2c; stroke-width: 4; }
      .desk { fill: #8b4e12; stroke: #5e3309; stroke-width: 4; }
      .caption { fill: #f5d77a; }
      .small { font-size: 28px; fill: #111; }
      .bubble { fill: #fff; stroke: #222; stroke-width: 4; }
    </style>
  </defs>
  <rect width="2048" height="768" fill="#ffffff"/>
  <rect x="0" y="0" width="680" height="768" class="panel"/>
  <rect x="684" y="0" width="680" height="768" class="panel"/>
  <rect x="1368" y="0" width="680" height="768" class="panel"/>

  <g transform="translate(0,0)">
    <rect x="0" y="0" width="680" height="570" fill="#c7ecf7"/>
    <ellipse cx="270" cy="300" rx="300" ry="250" fill="#eef9ff" opacity="0.9"/>
    <rect x="80" y="430" width="580" height="140" class="desk"/>
    <rect x="50" y="430" width="100" height="70" fill="#96a0aa" stroke="#555" stroke-width="3"/>
    <rect x="545" y="230" width="60" height="260" fill="#eee1c9" stroke="#555" stroke-width="3"/>
    <rect x="560" y="250" width="18" height="200" fill="#777"/>
    <rect x="584" y="250" width="18" height="200" fill="#777"/>
    <rect x="608" y="250" width="18" height="200" fill="#777"/>
    <rect x="100" y="250" width="170" height="170" fill="#6b88c8" rx="30"/>
    <circle cx="300" cy="250" r="45" fill="#d8a07f"/>
    <rect x="250" y="295" width="100" height="130" rx="45" fill="#6a7f58"/>
    <rect x="270" y="310" width="180" height="120" fill="#fff" stroke="#444" stroke-width="4"/>
    <rect x="350" y="325" width="20" height="100" fill="#bbb"/>
    <text x="210" y="140" class="ui" font-size="44" fill="#111">“Write</text>
    <text x="168" y="182" class="ui" font-size="44" fill="#111">me a short story</text>
    <text x="214" y="224" class="ui" font-size="44" fill="#111">about a college</text>
    <text x="262" y="266" class="ui" font-size="44" fill="#111">athlete.”</text>
    <path d="M290 270 L300 310" fill="none" stroke="#222" stroke-width="4"/>
    <rect x="0" y="570" width="680" height="198" class="caption"/>
    <text x="20" y="623" class="ui small">A student sits at his computer, trying to write a story</text>
    <text x="20" y="662" class="ui small">using AI</text>
  </g>

  <g transform="translate(684,0)">
    <rect x="0" y="0" width="680" height="570" fill="#c7ecf7"/>
    <ellipse cx="340" cy="290" rx="270" ry="220" fill="#eef9ff" opacity="0.95"/>
    <rect x="40" y="420" width="600" height="140" class="desk"/>
    <rect x="30" y="420" width="90" height="70" fill="#96a0aa" stroke="#555" stroke-width="3"/>
    <rect x="542" y="230" width="60" height="260" fill="#eee1c9" stroke="#555" stroke-width="3"/>
    <rect x="560" y="250" width="18" height="200" fill="#777"/>
    <rect x="584" y="250" width="18" height="200" fill="#777"/>
    <rect x="608" y="250" width="18" height="200" fill="#777"/>
    <rect x="100" y="250" width="170" height="170" fill="#6b88c8" rx="30"/>
    <circle cx="300" cy="250" r="45" fill="#d8a07f"/>
    <rect x="250" y="295" width="100" height="130" rx="45" fill="#6a7f58"/>
    <rect x="270" y="310" width="180" height="120" fill="#fff" stroke="#444" stroke-width="4"/>
    <rect x="350" y="325" width="20" height="100" fill="#bbb"/>
    <text x="118" y="155" class="ui" font-size="42" fill="#111">The screen lights up as text appears: Once there was a</text>
    <text x="118" y="198" class="ui" font-size="42" fill="#111">hardworking student-athlete who overcame</text>
    <text x="118" y="241" class="ui" font-size="42" fill="#111">challenges through dedication and discipline...</text>
    <rect x="0" y="570" width="680" height="198" class="caption"/>
    <text x="20" y="623" class="ui small">He starts making edits. (on screen edits: “injury,”</text>
    <text x="20" y="662" class="ui small">“doubt,” “recovery,” “uncertainty”). The frustration is</text>
    <text x="20" y="701" class="ui small">getting to him. Why can’t that be him.</text>
  </g>

  <g transform="translate(1368,0)">
    <rect x="0" y="0" width="680" height="570" fill="#c7ecf7"/>
    <ellipse cx="340" cy="290" rx="270" ry="220" fill="#eef9ff" opacity="0.95"/>
    <rect x="40" y="420" width="600" height="140" class="desk"/>
    <rect x="30" y="420" width="90" height="70" fill="#96a0aa" stroke="#555" stroke-width="3"/>
    <rect x="542" y="230" width="60" height="260" fill="#eee1c9" stroke="#555" stroke-width="3"/>
    <rect x="560" y="250" width="18" height="200" fill="#777"/>
    <rect x="584" y="250" width="18" height="200" fill="#777"/>
    <rect x="608" y="250" width="18" height="200" fill="#777"/>
    <rect x="100" y="250" width="170" height="170" fill="#6b88c8" rx="30"/>
    <circle cx="300" cy="250" r="45" fill="#d8a07f"/>
    <rect x="250" y="295" width="100" height="130" rx="45" fill="#6a7f58"/>
    <rect x="270" y="310" width="180" height="120" fill="#fff" stroke="#444" stroke-width="4"/>
    <rect x="350" y="325" width="20" height="100" fill="#bbb"/>
    <text x="163" y="120" class="ui" font-size="42" fill="#111">This</text>
    <text x="132" y="163" class="ui" font-size="42" fill="#111">sounds good...</text>
    <text x="121" y="206" class="ui" font-size="42" fill="#111">but it doesn’t</text>
    <text x="150" y="249" class="ui" font-size="42" fill="#111">feel like me.</text>
    <rect x="0" y="570" width="680" height="198" class="caption"/>
    <text x="20" y="623" class="ui small">Reading over the story, he becomes relieved by the</text>
    <text x="20" y="662" class="ui small">edits he made. Realizing AI can’t do everything, there</text>
    <text x="20" y="701" class="ui small">needs to be a connection.</text>
  </g>
</svg>