    <text x="86" y="988" class="ui" font-size="24" font-weight="700" fill="#1b2457">SINGLE QUERY FOOTPRINT</text>
    <text x="84" y="1040" class="ui" font-size="30" fill="#1b2457">AI footprint in numbers</text>
    <text x="78" y="1118" class="ui num">4.55 g CO2</text>
    <text x="78" y="1186" class="ui small">CO2 per ChatGPT query, mid</text>
    <text x="78" y="1210" class="ui small">estimate. - University of</text>
    <text x="78" y="1234" class="ui small">Michigan</text>
  </g>

