  <g>
    <rect x="50" y="712" width="668" height="226" rx="28" fill="#f2ad10"/>
    <text x="108" y="778" class="ui" font-size="28" fill="#1b2457">AI &amp; Ecology</text>
    <text x="72" y="860" class="ui num">560 flights</text>
    <text x="72" y="920" class="ui small">One GPT-3 training run equals</text>
    <text x="72" y="946" class="ui small">about 560 passenger round</text>
    <text x="72" y="972" class="ui small">trips.</text>
  </g>

  <g>
