      .heading { font-size: 30px; fill: #1b2457; }
      .cardText { fill: #1b2457; }
    </style>
  </defs>
  <rect width="768" height="1536" fill="#0f163c"/>

  <text x="70" y="78" class="ui" font-size="34" fill="#ffbf00">AI Sustainability</text>
  <text x="56" y="170" class="ui title">The Hidden</text>
  <text x="56" y="250" class="ui title">Cost of AI</text>
  <text x="88" y="332" class="ui subtitle">What it really costs to use AI</text>

  <g opacity="0.95">
    <rect x="460" y="18" width="78" height="92" rx="12" fill="#ff8ff3"/>
    <rect x="585" y="0" width="105" height="105" rx="52" fill="#f4b000"/>
