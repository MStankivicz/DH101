    <style>
      .note{font-family: Arial, Helvetica, sans-serif; fill:#f7e34a; font-weight:700; font-style:italic;}
      .white{font-family: Arial, Helvetica, sans-serif; fill:#ffffff; font-weight:700;}
      .black{font-family: Arial, Helvetica, sans-serif; fill:#111111; font-weight:700;}
      .arrow{stroke:#f7e34a; stroke-width:6; fill:none; stroke-linecap:round; stroke-linejoin:round;}
      .whiteArrow{stroke:#ffffff; stroke-width:5; fill:none; stroke-linecap:round; stroke-linejoin:round;}
    </style>
  </defs>
  <rect width="768" height="1024" fill="url(#bg)"/>
  <ellipse cx="384" cy="460" rx="300" ry="420" fill="#edf1f5" opacity="0.35"/>
