<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Playbook — An Interactive Story</title>
  <style>
    :root {
      --green: #1a3d2b;
      --green-light: #2e6b48;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --cream: #f5f0e8;
      --dark: #0f1f17;
      --text: #e8e0d0;
      --text-dim: #a09880;
      --choice-bg: #162e20;
      --choice-hover: #1e4530;
      --choice-border: #2e6b48;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--dark);
      color: var(--text);
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      background: var(--green);
      border-bottom: 3px solid var(--gold);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .title-block h1 {
      font-size: 1.4rem;
      color: var(--gold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .title-block p {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-family: 'Courier New', monospace;
      margin-top: 2px;
      letter-spacing: 0.05em;
    }
    .progress-block {
      text-align: right;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .progress-bar-wrap {
      width: 140px;
      height: 4px;
      background: var(--green-light);
      border-radius: 2px;
      margin-top: 6px;
      margin-left: auto;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* ── Game container ── */
    #game {
      width: 100%;
      max-width: 720px;
      padding: 48px 32px 80px;
      flex: 1;
    }

    /* ── Scene label ── */
    .scene-label {
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      color: var(--gold);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0.85;
    }

    /* ── Story text ── */
    .story-text {
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--text);
      animation: fadeIn 0.6s ease;
    }
    .story-text p { margin-bottom: 1.1em; }
    .story-text em { color: var(--gold-light); font-style: italic; }
    .story-text strong { color: var(--cream); }
    .aria-voice {
      display: block;
      background: rgba(46, 107, 72, 0.2);
      border-left: 3px solid var(--gold);
      padding: 10px 16px;
      margin: 14px 0;
      font-family: 'Courier New', monospace;
      font-size: 0.88rem;
      color: var(--gold-light);
      border-radius: 0 4px 4px 0;
    }

    /* ── Choices ── */
    .choices {
      margin-top: 36px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeIn 0.7s ease 0.2s both;
    }
    .choice-prompt {
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .choice-btn {
      background: var(--choice-bg);
      border: 1px solid var(--choice-border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      line-height: 1.5;
      padding: 14px 20px;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      position: relative;
    }
    .choice-btn::before {
      content: '▶';
      color: var(--gold);
      font-size: 0.65rem;
      margin-right: 10px;
      opacity: 0.7;
    }
    .choice-btn:hover {
      background: var(--choice-hover);
      border-color: var(--gold);
      transform: translateX(3px);
    }
    .choice-btn:active { transform: translateX(1px); }

    /* ── Continue button ── */
    .continue-btn {
      display: inline-block;
      margin-top: 28px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 24px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
    }
    .continue-btn:hover {
      background: var(--gold);
      color: var(--dark);
    }

    /* ── Ending card ── */
    .ending-card {
      border: 1px solid var(--gold);
      border-radius: 8px;
      padding: 28px 24px;
      margin-top: 32px;
      background: rgba(201, 168, 76, 0.06);
    }
    .ending-label {
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .ending-title {
      font-size: 1.3rem;
      color: var(--gold-light);
      margin-bottom: 12px;
    }
    .ending-subtext {
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 16px;
      line-height: 1.6;
    }
    .restart-btn {
      margin-top: 24px;
      background: transparent;
      border: 1px solid var(--green-light);
      color: var(--text-dim);
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 20px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .restart-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--green-light);
      margin: 28px 0;
      opacity: 0.5;
    }

    /* ── Footer ── */
    footer {
      width: 100%;
      text-align: center;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      border-top: 1px solid var(--green-light);
      opacity: 0.6;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Score indicator (hidden, just for tracking) */
    #score-debug { display: none; }
  </style>
</head>

      <p>"ARIA says sneak. I'm reading the linebacker — he's square, which means Dre might have a crease on a slant. Both could work. What do you all see?"</p>
      <p>TJ: <em>"Their nose guard's been playing soft. Sneak might have more room than it looks."</em></p>
      <p>Dre: <em>"Their safety's a step slow on in-breaking routes all half. Slant is there."</em></p>
      <span class="aria-voice">ARIA: "Both reads are consistent with what I'm seeing. I'd weight the sneak slightly — but the slant has merit. Either can work."</span>
      <p>You look at them. Your team. The voice in your ear. All of it at once.</p>
      <p>"Okay. Sneak right. Dre — if TJ opens it, we're done. If it closes, second play is the slant. <em>Together.</em>"</p>
      <p>TJ grins. That is, by any measure, a standing ovation.</p>
      <hr class="divider" />
      <p>You get three yards. First down. You score two plays later.</p>
      <p>Coach Harris finds you near the tunnel afterward. He shakes your hand the way coaches only shake hands after something real.</p>
      <p>"That timeout," he says. "That was leadership."</p>
      <p>You think about the huddle. ARIA weighed in without pretending to be the last word. TJ and Dre both saw something different. You listened to all of it — and made a call.</p>
      <p><em>ARIA processed 247 plays. TJ felt the nose guard cheat. Dre watched the safety all half. You read the room. None of those things alone wins the game. All of them together just did.</em></p>
    `
  }
};

// ─── Rendering ───────────────────────────────────────────────────────────────
function renderPassage(id) {
  const p = passages[id];
  if (!p) return;

  passageCount++;

  document.getElementById('scene-label').textContent = p.label;
  document.getElementById('story-text').innerHTML = p.text;
  document.getElementById('progress-bar').style.width = p.progress + '%';
  document.getElementById('progress-label').textContent =
    p.isEnding ? 'ENDING' : `PASSAGE ${passageCount}`;

  const choicesEl = document.getElementById('choices-container');
  choicesEl.innerHTML = '';

  if (p.isEnding) {
    // Render ending card
    const card = document.createElement('div');
    card.className = 'ending-card';
    card.innerHTML = `
      <div class="ending-label">You reached an ending</div>
      <div class="ending-title">"${p.endingTag}"</div>
      <div class="ending-subtext">${p.endingNote}</div>
    `;
    const restart = document.createElement('button');
    restart.className = 'restart-btn';
    restart.textContent = '↺ Play again from the beginning';
    restart.onclick = () => {
      score = 0;
      teamCommit = false;
      passageCount = 0;
      renderPassage('start');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    card.appendChild(restart);
    choicesEl.appendChild(card);

  } else if (p.choices.length === 1 && !p.choices[0].text.includes('"')) {
    // Single "continue" passage
    const btn = document.createElement('button');
    btn.className = 'continue-btn';
    btn.textContent = p.choices[0].text + ' →';
    btn.onclick = () => {
      if (p.choices[0].delta) score += p.choices[0].delta;
      goTo(p.choices[0].next);
    };
    choicesEl.appendChild(btn);

  } else {
    // Multiple choices
    const prompt = document.createElement('div');
    prompt.className = 'choice-prompt';
    prompt.textContent = 'What do you do?';
    choicesEl.appendChild(prompt);

    p.choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c.text;
      btn.onclick = () => {
        if (c.delta) score += c.delta;
        if (c.commit !== undefined) teamCommit = c.commit;
        goTo(c.next);
      };
      choicesEl.appendChild(btn);
    });
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goTo(id) {
  // Re-animate
  const story = document.getElementById('story-text');
  story.style.animation = 'none';
  story.offsetHeight; // reflow
  story.style.animation = '';
  renderPassage(id);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
renderPassage('start');
</script>
